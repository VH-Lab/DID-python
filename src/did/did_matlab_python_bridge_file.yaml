    out_of_sync: false
    decision_log: >
      MATLAB added 'b' (binary) mode variants (commit 2786be2).
      Python must_be_valid_permission already accepts binary modes
      (rb, wb, ab, r+b, w+b, a+b). In sync. Synchronized 2026-04-13.

